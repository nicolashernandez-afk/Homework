<!DOCTYPE html>
<html>
<head><title>My Video Player</title></head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif;">
  <h2>Paste Video ID below:</h2>
  <input type="text" id="vidInput" placeholder="Example: dQw4w9WgXcQ">
  <button onclick="playVid()">Watch</button>
  <br><br>
  <div id="player"></div>
  <script>
    function playVid() {
      var id = document.getElementById('vidInput').value;
      document.getElementById('player').innerHTML = 
      '<iframe width="100%" height="500px" src="https://www.youtube-nocookie.com/embed/' + id + '" frameborder="0" allowfullscreen></iframe>';
    }
  </script>
</body>
</html>
