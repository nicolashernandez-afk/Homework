<!DOCTYPE html>
<html>
<body>
  <h2>Paste Video ID below:</h2>
  <input type="text" id="vid" placeholder="Example: dQw4w9WgXcQ">
  <button onclick="play()">Watch</button>
  <div id="box"></div>
  <script>
    function play() {
      var id = document.getElementById('vid').value;
      if (id.includes("v=")) { id = id.split("v=")[1].split("&")[0]; }
      document.getElementById('box').innerHTML = '<iframe width="100%" height="400" src="https://www.youtube-nocookie.com' + id + '" frameborder="0" allowfullscreen></iframe>';
    }
  </script>
</body>
</html>
