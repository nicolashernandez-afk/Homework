<script>
  function playVid() {
    var input = document.getElementById('vidInput').value;
    var id = "";
    
    // This part automatically pulls the ID out of a full link
    if (input.includes("v=")) {
      id = input.split("v=")[1].split("&")[0];
    } else {
      id = input; // If you just paste the ID, it still works
    }
    
    document.getElementById('player').innerHTML = 
    '<iframe width="100%" height="500px" src="https://www.youtube-nocookie.com' + id + '" frameborder="0" allowfullscreen></iframe>';
  }
</script>
