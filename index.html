<script>
  function playVid() {
    var input = document.getElementById('vidInput').value;
    var videoId = "";

    // This "Regex" extracts the 11-character ID from any YouTube link format
    var regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    var match = input.match(regExp);

    if (match && match[2].length == 11) {
      videoId = match[2];
    } else {
      videoId = input; // Fallback if you just paste the ID
    }

    // Loads the video using the "nocookie" bypass domain
    document.getElementById('player').innerHTML = 
    '<iframe width="100%" height="500px" src="https://www.youtube-nocookie.com' + videoId + '" frameborder="0" allowfullscreen></iframe>';
  }
</script>
